name: Build and publish Mihon repository

on:
  push:
    branches: [main]
    paths:
      - "sources/**"
      - "scripts/**"
      - ".github/workflows/build-and-publish.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-mihon-repo
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout personal repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Validate signing secrets
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$SIGNING_KEY"
          test -n "$ALIAS"
          test -n "$KEY_STORE_PASSWORD"
          test -n "$KEY_PASSWORD"

      - name: Prepare compatible build environment
        shell: bash
        run: |
          set -euo pipefail
          git clone --depth 1 https://github.com/keiyoushi/extensions-source.git builder
          mkdir -p builder/src/pt
          for module in sources/*/; do
            pkg="$(basename "$module")"
            rm -rf "builder/src/pt/$pkg"
            cp -R "$module" "builder/src/pt/$pkg"
          done

      - name: Restore private signing key
        shell: bash
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
        run: |
          set -euo pipefail
          printf '%s' "$SIGNING_KEY" | base64 --decode > builder/signingkey.jks

      - name: Build extensions
        working-directory: builder
        shell: bash
        env:
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x gradlew
          tasks=()
          for module in ../sources/*/; do
            pkg="$(basename "$module")"
            tasks+=(":src:pt:$pkg:assembleRelease")
          done
          ./gradlew "${tasks[@]}"

      - name: Compute signing key fingerprint
        working-directory: builder
        shell: bash
        env:
          ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          FINGERPRINT="$(keytool -list -v -keystore signingkey.jks -alias "$ALIAS" -storepass "$KEY_STORE_PASSWORD" \
            | grep 'SHA256:' \
            | head -n1 \
            | sed 's/.*SHA256: *//' \
            | tr -d ': \r\n' \
            | tr '[:upper:]' '[:lower:]')"
          test -n "$FINGERPRINT"
          echo "SIGNING_KEY_FINGERPRINT=$FINGERPRINT" >> "$GITHUB_ENV"

      - name: Assemble Mihon repository
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/generate_repo.py

      - name: Publish generated branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          cd publish
          git init
          git checkout -b repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Publish Mihon repository"
          git remote add origin \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin repo
